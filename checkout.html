<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<meta name="theme-color" content="#0A0A0B">
<title>결제하기 · 3STRIPE EVENT</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Manrope:wght@800;900&display=swap" rel="stylesheet">
<script src="https://js.tosspayments.com/v2/standard"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0A0A0B; --bg-soft:#131316; --bg-elev:#1A1A1F;
  --fg:#FFFFFF; --fg-dim:rgba(255,255,255,0.65); --fg-muted:rgba(255,255,255,0.42);
  --accent:#FF1654; --yellow:#F5FF3D;
  --border:rgba(255,255,255,0.12);
}
body{
  font-family:'Pretendard Variable','Pretendard',-apple-system,sans-serif;
  background:var(--bg); color:var(--fg); min-height:100vh;
  display:flex; flex-direction:column; align-items:center; justify-content:center; padding:32px 24px;
  -webkit-font-smoothing:antialiased; line-height:1.55;
}
.shell{max-width:540px; width:100%;}
.brand{text-align:center; margin-bottom:36px;}
.brand .logo{font-family:'Manrope',sans-serif; font-weight:900; font-size:28px; letter-spacing:-0.03em;}
.brand .logo .dot{color:var(--accent);}
.brand p{font-family:'Space Grotesk',monospace; font-size:11px; font-weight:700; letter-spacing:0.18em; color:var(--fg-dim); text-transform:uppercase; margin-top:14px;}
.order{background:var(--bg-soft); border:1px solid var(--border); padding:32px 28px; margin-bottom:20px;}
.order h2{font-family:'Manrope',sans-serif; font-size:24px; font-weight:900; letter-spacing:-0.02em; margin-bottom:20px;}
.row{display:flex; justify-content:space-between; align-items:center; padding:14px 0; font-size:14px; border-bottom:1px solid var(--border); gap:16px;}
.row:last-child{border-bottom:none;}
.row .k{color:var(--fg-dim); font-family:'Space Grotesk',monospace; font-size:11px; font-weight:700; letter-spacing:0.14em; text-transform:uppercase;}
.row .v{font-weight:700; text-align:right; word-break:break-all;}
.total{display:flex; justify-content:space-between; align-items:baseline; padding:20px 0 0; font-family:'Manrope',sans-serif; font-size:24px; font-weight:900; letter-spacing:-0.02em; color:var(--accent); border-top:2px solid var(--border); margin-top:12px;}
.total .k{font-family:'Space Grotesk',monospace; font-size:11px; font-weight:700; letter-spacing:0.14em; color:var(--fg-dim); text-transform:uppercase;}
#payment-method,#agreement{background:var(--bg-soft); padding:8px; margin-bottom:16px; border:1px solid var(--border);}
.pay-btn{
  width:100%; padding:20px; background:var(--accent); color:var(--fg);
  border:1.5px solid var(--accent); font-family:inherit; font-size:15px; font-weight:700;
  letter-spacing:0.06em; text-transform:uppercase; cursor:pointer; transition:all .15s;
}
.pay-btn:hover:not(:disabled){background:var(--yellow); color:var(--bg); border-color:var(--yellow);}
.pay-btn:disabled{background:var(--bg-elev); border-color:var(--border); color:var(--fg-muted); cursor:not-allowed;}
.error-msg{color:var(--accent); font-size:13px; text-align:center; margin-top:14px; display:none;}
.empty{text-align:center; padding:60px 24px;}
.empty h3{font-family:'Manrope',sans-serif; font-size:32px; font-weight:900; margin-bottom:8px; letter-spacing:-0.03em;}
.empty p{color:var(--fg-dim); font-size:14px;}
::selection{background:var(--accent); color:var(--fg);}
</style>
</head>
<body>
<div class="shell">
  <div class="brand">
    <div class="logo">3STRIPE<span class="dot">.</span>EVENT</div>
    <p>Secure Payment / Toss Payments</p>
  </div>
  <div class="order" id="orderInfo">
    <h2>주문 정보</h2>
    <div class="row"><span class="k">Service</span><span class="v" id="dispOrderName">-</span></div>
    <div class="row"><span class="k">Order ID</span><span class="v" id="dispOrderId" style="font-family:'Space Grotesk',monospace; font-size:12px;">-</span></div>
    <div class="row"><span class="k">Customer</span><span class="v" id="dispCustomerName">-</span></div>
    <div class="total"><span class="k">Total</span><span id="dispAmount">-</span></div>
  </div>
  <div id="payment-method"></div>
  <div id="agreement"></div>
  <button class="pay-btn" id="payment-button" disabled>결제하기 →</button>
  <p class="error-msg" id="errorMsg"></p>
  <div class="empty" id="noParams" style="display:none;">
    <h3>NO ORDER.</h3>
    <p>결제 정보가 없습니다. 올바른 결제 링크로 접속해주세요.</p>
  </div>
</div>

<script>
main();
async function main(){
  const params = new URLSearchParams(window.location.search);
  const orderId = params.get('orderId');
  const orderName = params.get('orderName');
  const amount = parseInt(params.get('amount'));
  const customerName = params.get('customerName') || '';
  const customerEmail = params.get('customerEmail') || '';
  const customerPhone = params.get('customerPhone') || '';
  if (!orderId || !orderName || !amount){
    document.getElementById('orderInfo').style.display='none';
    document.getElementById('payment-method').style.display='none';
    document.getElementById('agreement').style.display='none';
    document.querySelector('.pay-btn').style.display='none';
    document.getElementById('noParams').style.display='block';
    return;
  }
  document.getElementById('dispOrderName').textContent = decodeURIComponent(orderName);
  document.getElementById('dispOrderId').textContent = orderId;
  document.getElementById('dispCustomerName').textContent = customerName || '-';
  document.getElementById('dispAmount').textContent = amount.toLocaleString() + '원';
  const button = document.getElementById('payment-button');
  const clientKey = "test_gck_docs_Ovk5rk1EwkEbP0W43n07xlzm";
  const tossPayments = TossPayments(clientKey);
  const customerKey = 'cust_' + Date.now() + '_' + Math.random().toString(36).substr(2,9);
  const widgets = tossPayments.widgets({ customerKey });
  await widgets.setAmount({ currency:"KRW", value:amount });
  await widgets.renderPaymentMethods({ selector:"#payment-method", variantKey:"DEFAULT" });
  await widgets.renderAgreement({ selector:"#agreement", variantKey:"AGREEMENT" });
  button.disabled = false;
  button.addEventListener("click", async function(){
    button.disabled = true; button.textContent = '결제 처리 중...';
    try {
      await widgets.requestPayment({
        orderId, orderName: decodeURIComponent(orderName),
        successUrl: window.location.origin + "/success.html",
        failUrl: window.location.origin + "/fail.html",
        customerEmail, customerMobilePhone: customerPhone, customerName
      });
    } catch (error) {
      button.disabled = false; button.textContent = '결제하기 →';
      if (error.code !== 'USER_CANCEL'){
        const e = document.getElementById('errorMsg');
        e.textContent = error.message || '결제 중 오류가 발생했습니다.';
        e.style.display = 'block';
      }
    }
  });
}
</script>
</body>
</html>
