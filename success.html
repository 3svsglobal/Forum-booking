<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<meta name="theme-color" content="#0A0A0B">
<title>결제 완료 · 3STRIPE EVENT</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Manrope:wght@800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#0A0A0B;--bg-soft:#131316;--fg:#FFFFFF;--fg-dim:rgba(255,255,255,0.65);--fg-muted:rgba(255,255,255,0.42);--accent:#FF1654;--yellow:#F5FF3D;--success:#22DD88;--danger:#FF3838;--warn:#FFB020;--border:rgba(255,255,255,0.12);}
body{font-family:'Pretendard Variable','Pretendard',-apple-system,sans-serif;background:var(--bg);color:var(--fg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px 24px;-webkit-font-smoothing:antialiased;line-height:1.55;}
.shell{max-width:520px;width:100%;}
.card{background:var(--bg-soft);border:1px solid var(--border);padding:48px 36px;text-align:center;}
.mark{width:80px;height:80px;display:inline-flex;align-items:center;justify-content:center;font-family:'Manrope',sans-serif;font-size:40px;font-weight:900;color:var(--fg);margin-bottom:32px;}
.mark-success{background:var(--success);color:var(--bg);}
.mark-loading{background:var(--warn);color:var(--bg);}
.mark-fail{background:var(--danger);}
h2{font-family:'Manrope',sans-serif;font-size:40px;font-weight:900;letter-spacing:-0.04em;line-height:0.95;margin-bottom:12px;}
.sub{color:var(--fg-dim);font-size:14px;margin-bottom:28px;}
.info{text-align:left;border-top:1px solid var(--border);padding-top:20px;margin-top:8px;}
.row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;font-size:13px;border-bottom:1px solid var(--border);gap:14px;}
.row:last-child{border-bottom:none;}
.row .k{color:var(--fg-dim);font-family:'Space Grotesk',monospace;font-size:11px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;}
.row .v{font-weight:600;font-size:13px;text-align:right;max-width:60%;word-break:break-all;font-family:'Space Grotesk',monospace;}
.btn{display:inline-flex;align-items:center;gap:8px;padding:16px 32px;font-family:inherit;font-weight:700;font-size:13px;border:1.5px solid var(--fg);background:var(--fg);color:var(--bg);text-transform:uppercase;letter-spacing:0.06em;text-decoration:none;cursor:pointer;transition:all .15s;margin-top:32px;}
.btn:hover{background:var(--accent);border-color:var(--accent);color:var(--fg);}
.btn-outline{background:transparent;color:var(--fg);}
.btn-outline:hover{background:var(--fg);color:var(--bg);}
::selection{background:var(--accent);color:var(--fg);}
</style>
</head>
<body>
<div class="shell">
  <div class="card">
    <div id="loadingState">
      <div class="mark mark-loading">⏳</div>
      <h2>CONFIRMING.</h2>
      <p class="sub">결제 승인 처리 중입니다. 잠시만 기다려 주세요.</p>
    </div>
    <div id="successState" style="display:none;">
      <div class="mark mark-success">✓</div>
      <h2>PAYMENT<br>SUCCESS.</h2>
      <p class="sub">결제가 정상 완료되었습니다. 담당자가 곧 연락드립니다.</p>
      <div class="info">
        <div class="row"><span class="k">Order ID</span><span class="v" id="successOrderId">-</span></div>
        <div class="row"><span class="k">Amount</span><span class="v" id="successAmount">-</span></div>
        <div class="row"><span class="k">Method</span><span class="v" id="successMethod">-</span></div>
        <div class="row"><span class="k">Payment Key</span><span class="v" id="successPaymentKey">-</span></div>
      </div>
      <a href="/" class="btn">홈으로 →</a>
    </div>
    <div id="failState" style="display:none;">
      <div class="mark mark-fail">✕</div>
      <h2>APPROVAL<br>FAILED.</h2>
      <p class="sub" id="failMessage">-</p>
      <a href="/" class="btn btn-outline">홈으로 →</a>
    </div>
  </div>
</div>
<script>
main();
async function main(){
  const params = new URLSearchParams(window.location.search);
  const paymentKey = params.get("paymentKey");
  const orderId = params.get("orderId");
  const amount = params.get("amount");
  const paymentType = params.get("paymentType");
  if (!paymentKey || !orderId || !amount){ showFail("결제 정보가 올바르지 않습니다."); return; }
  try {
    const response = await fetch("/api/confirm", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({paymentKey, orderId, amount: parseInt(amount)})
    });
    const result = await response.json();
    if (response.ok) showSuccess(orderId, amount, paymentType, paymentKey);
    else showFail(result.message || "결제 승인에 실패했습니다.");
  } catch (e){ showFail("결제 승인 중 오류: " + e.message); }
}
function showSuccess(orderId, amount, paymentType, paymentKey){
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('successState').style.display = 'block';
  document.getElementById('successOrderId').textContent = orderId;
  document.getElementById('successAmount').textContent = parseInt(amount).toLocaleString() + '원';
  document.getElementById('successMethod').textContent = paymentType === 'NORMAL' ? '일반결제' : (paymentType || '-');
  document.getElementById('successPaymentKey').textContent = paymentKey;
}
function showFail(message){
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('failState').style.display = 'block';
  document.getElementById('failMessage').textContent = message;
}
</script>
</body>
</html>
