<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<meta name="theme-color" content="#0A0A0B">
<title>결제 실패 · 3STRIPE EVENT</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Manrope:wght@800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#0A0A0B;--bg-soft:#131316;--fg:#FFFFFF;--fg-dim:rgba(255,255,255,0.65);--accent:#FF1654;--danger:#FF3838;--border:rgba(255,255,255,0.12);}
body{font-family:'Pretendard Variable','Pretendard',-apple-system,sans-serif;background:var(--bg);color:var(--fg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px 24px;-webkit-font-smoothing:antialiased;line-height:1.55;}
.shell{max-width:520px;width:100%;}
.card{background:var(--bg-soft);border:1px solid var(--border);padding:48px 36px;text-align:center;}
.mark{width:80px;height:80px;background:var(--danger);display:inline-flex;align-items:center;justify-content:center;font-family:'Manrope',sans-serif;font-size:40px;font-weight:900;color:var(--fg);margin-bottom:32px;}
h2{font-family:'Manrope',sans-serif;font-size:40px;font-weight:900;letter-spacing:-0.04em;line-height:0.95;margin-bottom:12px;}
.sub{color:var(--fg-dim);font-size:14px;margin-bottom:28px;}
.info{text-align:left;border-top:1px solid var(--border);padding-top:20px;margin-top:8px;}
.row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;font-size:13px;border-bottom:1px solid var(--border);gap:14px;}
.row:last-child{border-bottom:none;}
.row .k{color:var(--fg-dim);font-family:'Space Grotesk',monospace;font-size:11px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;}
.row .v{font-weight:600;font-size:13px;text-align:right;max-width:65%;word-break:break-all;font-family:'Space Grotesk',monospace;}
.btn{display:inline-flex;align-items:center;gap:8px;padding:16px 32px;font-family:inherit;font-weight:700;font-size:13px;border:1.5px solid var(--fg);background:transparent;color:var(--fg);text-transform:uppercase;letter-spacing:0.06em;text-decoration:none;cursor:pointer;transition:all .15s;margin-top:32px;}
.btn:hover{background:var(--fg);color:var(--bg);}
::selection{background:var(--accent);color:var(--fg);}
</style>
</head>
<body>
<div class="shell">
  <div class="card">
    <div class="mark">✕</div>
    <h2>PAYMENT<br>FAILED.</h2>
    <p class="sub">결제에 실패했습니다. 아래 정보를 확인해 주세요.</p>
    <div class="info">
      <div class="row"><span class="k">Error Code</span><span class="v" id="code">-</span></div>
      <div class="row"><span class="k">Reason</span><span class="v" id="message">-</span></div>
      <div class="row"><span class="k">Order ID</span><span class="v" id="orderId">-</span></div>
    </div>
    <a href="/" class="btn">홈으로 →</a>
  </div>
</div>
<script>
const params = new URLSearchParams(window.location.search);
document.getElementById("code").textContent = params.get("code") || "-";
document.getElementById("message").textContent = params.get("message") || "-";
document.getElementById("orderId").textContent = params.get("orderId") || "-";
</script>
</body>
</html>
