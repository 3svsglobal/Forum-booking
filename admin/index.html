<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0A0A0B; --bg-soft:#131316; --bg-elev:#1A1A1F;
  --fg:#FFFFFF; --fg-dim:rgba(255,255,255,0.65); --fg-muted:rgba(255,255,255,0.42);
  --accent:#C9A24A; --gold:#9C7B30; --gold-soft:rgba(201,162,74,0.12);
  --border:rgba(255,255,255,0.12); --border-strong:rgba(255,255,255,0.24);
  --success:#22DD88; --danger:#FF3838; --warn:#FFB020;
}
html{scroll-behavior:smooth;}
body{
  font-family:'Pretendard Variable','Pretendard',-apple-system,sans-serif;
  background:var(--bg); color:var(--fg); line-height:1.55; min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
button{font-family:inherit; cursor:pointer; background:none; border:none; color:inherit;}
input,select,textarea{font-family:inherit; font-size:inherit; color:inherit;}
a{color:inherit; text-decoration:none;}
.mono{font-family:'Space Grotesk',monospace;}
.display{font-family:'Pretendard Variable','Pretendard',sans-serif; font-weight:900; letter-spacing:-0.04em; line-height:0.95;}
.eyebrow{font-family:'Space Grotesk',monospace; font-size:11px; font-weight:700; letter-spacing:0.18em; text-transform:uppercase;}

/* Header */
.admin-head{padding:24px 32px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; background:var(--bg); position:sticky; top:0; z-index:50;}
.admin-head .logo{font-family:'Pretendard Variable','Pretendard',sans-serif; font-weight:900; font-size:18px; letter-spacing:-0.02em;}
.admin-head .logo .dot{color:var(--accent);}
.admin-head .logo small{font-family:'Space Grotesk',monospace; font-size:11px; font-weight:700; letter-spacing:0.18em; color:var(--accent); margin-left:14px;}
.admin-head a.back{font-family:'Space Grotesk',monospace; font-size:12px; font-weight:700; letter-spacing:0.14em; text-transform:uppercase; color:var(--fg-dim);}
.admin-head a.back:hover{color:var(--fg);}

/* Buttons */
.btn{display:inline-flex; align-items:center; gap:8px; padding:12px 22px; font-weight:700; font-size:13px; border:1.5px solid var(--fg); background:var(--fg); color:var(--bg); text-transform:uppercase; letter-spacing:0.06em; transition:all .15s; cursor:pointer;}
.btn:hover{background:var(--accent); border-color:var(--accent); color:var(--fg);}
.btn-outline{background:transparent; color:var(--fg);}
.btn-outline:hover{background:var(--fg); color:var(--bg);}
.btn-accent{background:var(--accent); border-color:var(--accent); color:var(--fg);}
.btn-accent:hover{background:var(--gold); border-color:var(--gold); color:var(--bg);}
.btn-danger{background:var(--danger); border-color:var(--danger); color:var(--fg);}
.btn-danger:hover{background:var(--fg); color:var(--danger); border-color:var(--fg);}
.btn-success{background:var(--success); border-color:var(--success); color:var(--bg);}
.btn-success:hover{background:var(--fg); color:var(--success); border-color:var(--fg);}
.btn-sm{padding:8px 14px; font-size:11px;}

/* Login */
.login-wrap{min-height:calc(100vh - 80px); display:flex; align-items:center; justify-content:center; padding:32px;}
.login-card{max-width:420px; width:100%; border:1px solid var(--border); padding:48px 36px; background:var(--bg-soft);}
.login-card h1{font-family:'Pretendard Variable','Pretendard',sans-serif; font-size:48px; font-weight:900; letter-spacing:-0.04em; line-height:0.95; margin-bottom:8px;}
.login-card .sub{font-family:'Space Grotesk',monospace; font-size:11px; font-weight:700; letter-spacing:0.18em; color:var(--accent); text-transform:uppercase; margin-bottom:32px;}
.login-card input{width:100%; padding:16px; background:var(--bg); border:1.5px solid var(--border); color:var(--fg); font-size:15px; margin-bottom:16px; outline:none; transition:border-color .15s;}
.login-card input:focus{border-color:var(--accent);}

/* Dashboard */
.dash{padding:32px; max-width:1640px; margin:0 auto;}
.dash-head{margin-bottom:32px;}
.dash-head h1{font-family:'Pretendard Variable','Pretendard',sans-serif; font-size:clamp(40px,5vw,72px); font-weight:900; letter-spacing:-0.04em; line-height:0.95; margin-bottom:8px;}
.dash-head .eyebrow{color:var(--accent); margin-bottom:14px; display:block;}

/* Stats */
.stats{display:grid; grid-template-columns:repeat(4,1fr); gap:0; border-top:1px solid var(--border); border-left:1px solid var(--border); margin-bottom:40px;}
.stat{padding:28px 28px; border-right:1px solid var(--border); border-bottom:1px solid var(--border);}
.stat-num{font-family:'Pretendard Variable','Pretendard',sans-serif; font-size:48px; font-weight:900; line-height:1; letter-spacing:-0.03em; margin-bottom:8px;}
.stat-label{font-family:'Space Grotesk',monospace; font-size:11px; font-weight:700; letter-spacing:0.18em; color:var(--fg-dim); text-transform:uppercase;}
@media (max-width:900px){.stats{grid-template-columns:1fr 1fr;}}

/* Tabs */
.tabs{display:flex; gap:0; border-bottom:1px solid var(--border); margin-bottom:24px; flex-wrap:wrap;}
.tab{padding:14px 22px; font-family:'Space Grotesk',monospace; font-size:12px; font-weight:700; letter-spacing:0.14em; text-transform:uppercase; color:var(--fg-dim); border-bottom:2px solid transparent; cursor:pointer; transition:all .15s;}
.tab:hover{color:var(--fg);}
.tab.active{color:var(--accent); border-bottom-color:var(--accent);}

/* Table */
.table-wrap{border:1px solid var(--border); overflow:auto; margin-bottom:48px;}
table{width:100%; border-collapse:collapse; min-width:920px;}
thead{background:var(--bg-soft);}
th{padding:14px 16px; text-align:left; font-family:'Space Grotesk',monospace; font-size:11px; font-weight:700; letter-spacing:0.14em; color:var(--fg-dim); text-transform:uppercase; border-bottom:1px solid var(--border); white-space:nowrap;}
td{padding:14px 16px; border-bottom:1px solid var(--border); font-size:14px; vertical-align:middle;}
tbody tr:hover{background:var(--bg-soft); cursor:pointer;}
.badge{display:inline-block; padding:4px 10px; font-family:'Space Grotesk',monospace; font-size:10px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase;}
.badge-pending{background:rgba(255,176,32,0.15); color:var(--warn);}
.badge-confirmed{background:rgba(34,221,136,0.15); color:var(--success);}
.badge-cancelled{background:rgba(255,56,56,0.15); color:var(--danger);}
.badge-paid{background:rgba(34,221,136,0.15); color:var(--success);}
.badge-unpaid{background:var(--bg-elev); color:var(--fg-dim);}

.empty{padding:60px 24px; text-align:center; color:var(--fg-muted);}
.empty h3{font-family:'Pretendard Variable','Pretendard',sans-serif; font-size:24px; font-weight:900; margin-bottom:8px;}

/* Section heading */
.dash-section-head{display:flex; justify-content:space-between; align-items:center; margin:48px 0 20px; gap:16px;}
.dash-section-head h2{font-family:'Pretendard Variable','Pretendard',sans-serif; font-size:32px; font-weight:900; letter-spacing:-0.03em; line-height:1;}
.dash-section-head .eyebrow{color:var(--accent); margin-bottom:4px;}

/* Modal */
.modal{display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:200; align-items:center; justify-content:center; padding:24px;}
.modal.open{display:flex;}
.modal-inner{background:var(--bg); border:1px solid var(--border); max-width:680px; width:100%; max-height:88vh; overflow-y:auto; padding:36px; position:relative;}
.modal-close{position:absolute; top:20px; right:20px; width:36px; height:36px; border:1px solid var(--border); display:flex; align-items:center; justify-content:center;}
.modal-close:hover{background:var(--fg); color:var(--bg);}
.modal h3{font-family:'Pretendard Variable','Pretendard',sans-serif; font-size:28px; font-weight:900; letter-spacing:-0.03em; margin-bottom:6px; line-height:1.1;}
.modal-ref{font-family:'Space Grotesk',monospace; font-size:11px; font-weight:700; letter-spacing:0.18em; color:var(--accent); text-transform:uppercase; margin-bottom:24px;}

.detail-grid{display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:24px;}
.detail-cell{background:var(--bg-soft); padding:14px 16px;}
.detail-cell .k{font-family:'Space Grotesk',monospace; font-size:10px; font-weight:700; letter-spacing:0.16em; text-transform:uppercase; color:var(--fg-muted); margin-bottom:4px;}
.detail-cell .v{font-weight:700; font-size:14px;}
.detail-full{background:var(--bg-soft); padding:14px 16px; margin-bottom:14px; font-size:14px;}
.detail-full .k{font-family:'Space Grotesk',monospace; font-size:10px; font-weight:700; letter-spacing:0.16em; text-transform:uppercase; color:var(--fg-muted); margin-bottom:6px;}
.modal-actions{display:flex; gap:10px; flex-wrap:wrap; margin-top:24px; padding-top:24px; border-top:1px solid var(--border);}

@media (max-width:640px){
  .dash{padding:20px;}
  .detail-grid{grid-template-columns:1fr;}
  .admin-head{padding:18px 20px;}
}

::selection{background:var(--accent); color:var(--fg);}
::-webkit-scrollbar{width:10px; height:10px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border-strong);}
</style>
</head>

async function adminLogin(){
  const pw = document.getElementById('adminPw').value;
  if (pw !== ADMIN_PASS){ alert('비밀번호가 틀렸습니다.'); return; }
  document.getElementById('loginView').style.display = 'none';
  document.getElementById('dashView').style.display = 'block';
  await loadAll();
}

async function loadAll(){
  await loadBookings();
  await loadInquiries();
}

async function loadBookings(){
  try {
    if (db){
      const { data, error } = await db.from('bookings').select('*').order('created_at',{ascending:false});
      if (error) throw error;
      if (data && data.length > 0){
        bookings = data.map(b => ({
          id:b.id, ref:b.ref_number, event_type:b.event_type,
          date:b.preferred_date, time:b.preferred_time_slot,
          count:b.attendee_count, region:b.region, level:b.service_level,
          name:b.name, email:b.email, phone:b.phone,
          company:b.company, message:b.message,
          status:b.status, payment:b.payment_status
        }));
      } else {
        bookings = demoBookings;
      }
    } else {
      bookings = demoBookings;
    }
  } catch(e){ console.warn('Supabase load failed, using demo:', e); bookings = demoBookings; }
  updateStats(); renderBookings();
}

    if (!db) return;
    const { data, error } = await db.from('inquiries').select('*').order('created_at',{ascending:false});
    if (error) throw error;
    if (data) inquiries = data;
  } catch(e){ console.warn('Inquiries load failed:', e); }
  renderInquiries();
}

function refreshAll(){ loadAll(); }

function updateStats(){
  const total = bookings.length;
  const pending = bookings.filter(b => b.status === 'pending').length;
  const confirmed = bookings.filter(b => b.status === 'confirmed').length;
  const cancelled = bookings.filter(b => b.status === 'cancelled').length;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statPending').textContent = pending;
  document.getElementById('statConfirmed').textContent = confirmed;
  document.getElementById('statCancelled').textContent = cancelled;
  document.getElementById('tabAll').textContent = '전체 (' + total + ')';
  document.getElementById('tabPending').textContent = '대기중 (' + pending + ')';
  document.getElementById('tabConfirmed').textContent = '확정 (' + confirmed + ')';
  document.getElementById('tabCancelled').textContent = '취소 (' + cancelled + ')';
}

function statusBadge(s){
  const map = { pending:['badge-pending','대기중'], confirmed:['badge-confirmed','확정'], cancelled:['badge-cancelled','취소'] };
  const v = map[s] || map.pending;
  return '<span class="badge '+v[0]+'">'+v[1]+'</span>';
}
function paymentBadge(p){
  if (p === 'paid') return '<span class="badge badge-paid">결제완료</span>';
  return '<span class="badge badge-unpaid">미결제</span>';
}

function renderBookings(){
  const filtered = currentFilter === 'all' ? bookings : bookings.filter(b => b.status === currentFilter);
  const tbody = document.getElementById('bookingsBody');
  if (filtered.length === 0){
    tbody.innerHTML = '<tr><td colspan="9" class="empty"><h3>NO BOOKINGS.</h3><p>표시할 예약이 없습니다.</p></td></tr>';
    return;
  }
  tbody.innerHTML = filtered.map(b => `
    <tr onclick="openDetail(${b.id})">
      <td class="mono" style="color:var(--fg-dim); font-size:12px;">${b.date || '-'}</td>
      <td style="font-weight:600;">${b.event_type || '-'}</td>
      <td>
        <div style="font-weight:700;">${b.name}</div>
        <div style="font-size:12px; color:var(--fg-muted); font-family:'Space Grotesk',monospace;">${b.company || '-'}</div>
      </td>
      <td class="mono" style="font-size:12px;">${b.phone || '-'}</td>
      <td>${b.count || '-'}</td>
      <td style="font-size:13px;">${b.region || '-'}</td>
      <td>${statusBadge(b.status)}</td>
      <td>${paymentBadge(b.payment)}</td>
      <td><span style="color:var(--accent); font-weight:700; font-size:12px;">상세 →</span></td>
    </tr>
  `).join('');
}

function renderInquiries(){
  document.getElementById('consultCount').textContent = inquiries.length;
  const tbody = document.getElementById('inquiriesBody');
  if (inquiries.length === 0){
    tbody.innerHTML = '<tr><td colspan="6" class="empty"><h3>NO INQUIRIES.</h3><p>접수된 문의가 없습니다.</p></td></tr>';
    return;
  }
  tbody.innerHTML = inquiries.map(q => `
    <tr>
      <td class="mono" style="color:var(--fg-dim); font-size:12px;">${q.created_at ? q.created_at.slice(0,10) : '-'}</td>
      <td><span class="badge badge-paid" style="background:rgba(156,123,48,0.15); color:var(--gold);">${q.category || '기타'}</span></td>
      <td>
        <div style="font-weight:700;">${q.name}</div>
        <div style="font-size:12px; color:var(--fg-muted);">${q.company || ''}</div>
      </td>
      <td class="mono" style="font-size:12px;">
        <div>${q.phone || ''}</div>
        <div style="color:var(--fg-muted);">${q.email || ''}</div>
      </td>
      <td style="max-width:380px; font-size:13px;">
        <div style="white-space:pre-wrap; word-break:break-word; max-height:80px; overflow:auto;">${(q.message || '').replace(/</g,'&lt;')}</div>
      </td>
      <td><button class="btn btn-danger btn-sm" onclick="deleteInquiry(${q.id})">삭제</button></td>
    </tr>
  `).join('');
}

function filterBookings(el, f){
  currentFilter = f;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderBookings();
}

function openDetail(id){
  const b = bookings.find(x => x.id === id);
  if (!b) return;
  document.getElementById('modalRef').textContent = 'REF / ' + (b.ref || '—');
  document.getElementById('modalTitle').textContent = b.name + ' · ' + (b.event_type || '');
  document.getElementById('modalContent').innerHTML = `
    <div class="detail-grid">
      <div class="detail-cell"><div class="k">이벤트 유형</div><div class="v">${b.event_type || '-'}</div></div>
      <div class="detail-cell"><div class="k">희망 일정</div><div class="v">${b.date || '-'} · ${b.time || '-'}</div></div>
      <div class="detail-cell"><div class="k">참가 인원</div><div class="v">${b.count || '-'}</div></div>
      <div class="detail-cell"><div class="k">희망 지역</div><div class="v">${b.region || '-'}</div></div>
      <div class="detail-cell"><div class="k">서비스 레벨</div><div class="v">${b.level || '-'}</div></div>
      <div class="detail-cell"><div class="k">소속</div><div class="v">${b.company || '-'}</div></div>
    </div>
    <div class="detail-full"><div class="k">연락처</div><div style="font-family:'Space Grotesk',monospace; font-weight:700; font-size:14px;">${b.email || '-'} · ${b.phone || '-'}</div></div>
    ${b.message ? `<div class="detail-full"><div class="k">추가 요청사항</div><div>${(b.message||'').replace(/</g,'&lt;')}</div></div>` : ''}
    <div style="display:flex; gap:10px;">${statusBadge(b.status)} ${paymentBadge(b.payment)}</div>
  `;
  let actions = '';
  if (b.status === 'pending'){
    actions += `<button class="btn btn-success btn-sm" onclick="updateStatus(${b.id},'confirmed')">✓ 예약 확정</button>`;
    actions += `<button class="btn btn-danger btn-sm" onclick="updateStatus(${b.id},'cancelled')">✕ 취소</button>`;
  }
  if (b.status === 'confirmed' && b.payment === 'unpaid'){
    actions += `<button class="btn btn-accent btn-sm" onclick="generatePaymentLink(${b.id})">결제 링크 생성</button>`;
    actions += `<button class="btn btn-success btn-sm" onclick="markPaid(${b.id})">수동 결제완료</button>`;
  }
  actions += `<button class="btn btn-danger btn-sm" onclick="deleteBooking(${b.id})">삭제</button>`;
  actions += `<button class="btn btn-outline btn-sm" onclick="closeModal()">닫기</button>`;
  document.getElementById('modalActions').innerHTML = actions;
  document.getElementById('bookingModal').classList.add('open');
}

function closeModal(){ document.getElementById('bookingModal').classList.remove('open'); }
document.getElementById('bookingModal').addEventListener('click', function(e){
  if (e.target === this) closeModal();
});
document.addEventListener('keydown', function(e){ if (e.key === 'Escape') closeModal(); });

async function updateStatus(id, newStatus){
  try { if (db) { const { error } = await db.from('bookings').update({status:newStatus}).eq('id', id); if (error) throw error; } } catch(e){ console.warn(e); }
  const b = bookings.find(x => x.id === id); if (b) b.status = newStatus;
  updateStats(); renderBookings(); closeModal();
}
async function markPaid(id){
  try { if (db) { const { error } = await db.from('bookings').update({payment_status:'paid'}).eq('id', id); if (error) throw error; } } catch(e){ console.warn(e); }
  const b = bookings.find(x => x.id === id); if (b) b.payment = 'paid';
  updateStats(); renderBookings(); closeModal();
}
async function deleteBooking(id){
  if (!confirm('이 예약을 정말 삭제하시겠습니까?')) return;
  try { if (db) { const { error } = await db.from('bookings').delete().eq('id', id); if (error) throw error; } } catch(e){ console.warn(e); }
  bookings = bookings.filter(x => x.id !== id);
  updateStats(); renderBookings(); closeModal();
}
async function deleteInquiry(id){
  if (!confirm('이 문의를 삭제하시겠습니까?')) return;
  try { if (db) { const { error } = await db.from('inquiries').delete().eq('id', id); if (error) throw error; } } catch(e){ console.warn(e); }
  inquiries = inquiries.filter(q => q.id !== id);
  renderInquiries();
}

function generatePaymentLink(id){
  const b = bookings.find(x => x.id === id); if (!b) return;
  const amount = prompt('결제 금액(원, 숫자만):', '');
  if (!amount || isNaN(amount) || parseInt(amount) <= 0){ alert('올바른 금액을 입력해주세요.'); return; }
  const params = new URLSearchParams({
    orderId: b.ref,
    orderName: encodeURIComponent((b.event_type || '') + ' - ' + (b.level || '')),
    amount: parseInt(amount),
    customerName: b.name,
    customerEmail: b.email || '',
    customerPhone: b.phone ? b.phone.replace(/-/g,'') : ''
  });
  const paymentUrl = window.location.origin + '/checkout.html?' + params.toString();
  document.getElementById('modalContent').innerHTML = `
    <div style="border:1px solid var(--accent); padding:24px; margin-bottom:16px; background:rgba(201,162,74,0.06);">
      <div style="font-family:'Space Grotesk',monospace; font-size:11px; font-weight:700; letter-spacing:0.18em; color:var(--accent); text-transform:uppercase; margin-bottom:10px;">Payment Link Created</div>
      <div style="font-size:14px; color:var(--fg-dim); margin-bottom:14px;">아래 링크를 고객에게 전달하세요. 금액: <strong style="color:var(--fg);">${parseInt(amount).toLocaleString()}원</strong></div>
      <input type="text" value="${paymentUrl}" id="payLinkInput" readonly style="width:100%; padding:12px; background:var(--bg); border:1px solid var(--border); color:var(--fg); font-family:'Space Grotesk',monospace; font-size:12px; margin-bottom:10px;">
      <button class="btn btn-accent btn-sm" onclick="copyPayLink()" style="width:100%; justify-content:center;">링크 복사하기</button>
    </div>
  `;
  document.getElementById('modalActions').innerHTML = '<button class="btn btn-outline btn-sm" onclick="closeModal()">닫기</button>';
}
function copyPayLink(){
  const inp = document.getElementById('payLinkInput'); inp.select(); document.execCommand('copy'); alert('결제 링크가 복사되었습니다.');
}
</script>
</body>
</html>
